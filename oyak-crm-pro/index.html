                        </div>
                    </div>
                `;
                document.body.appendChild(div);
            }

            openStatusModal(id) {
                const m = Store.state.meetings.find(m => m.id === id);
                if(!m) return;
                const company = [...Store.state.leads, ...Store.state.customers].find(c => c.id === Number(m.companyId));
                
                const div = document.createElement('div');
                div.className = 'modal-overlay';
                div.innerHTML = `
                    <div class="modal-content glass" style="width:400px;">
                        <div class="modal-header"><h3>Görüşme Durumunu Güncelle</h3><button class="btn btn-ghost btn-sm" onclick="this.closest('.modal-overlay').remove()">&times;</button></div>
                        <form onsubmit="event.preventDefault(); window.app.saveMeetingStatus(this, ${id});" class="crm-form">
                            <div style="margin-bottom:15px;">
                                <strong>${company?.company}</strong><br/>
                                <small style="opacity:0.6;">${m.date} - ${m.time}</small>
                            </div>
                            <div class="form-group">
                                <label>Durum</label>
                                <select name="status">
                                    <option value="Planlandı" ${m.status === 'Planlandı' ? 'selected' : ''}>Planlandı / Bekliyor</option>
                                    <option value="Yapıldı" ${m.status === 'Yapıldı' ? 'selected' : ''}>Yapıldı / Tamamlandı</option>
                                    <option value="İptal" ${m.status === 'İptal' ? 'selected' : ''}>İptal Edildi</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Notlar / Sonuç</label>
                                <textarea name="comment" rows="3" placeholder="Görüşme nasıl geçti?">${m.comment || ''}</textarea>
                                ${this.renderWarning()}
                            </div>
                            <div class="modal-footer" style="display:flex; justify-content:space-between; align-items:center;">
                                <button type="button" class="btn btn-ghost btn-sm" style="color:var(--primary-red)" onclick="this.closest('.modal-overlay').remove(); Store.deleteMeeting(${id});">🗑️ Bu Görüşmeyi Sil</button>
                                <div style="display:flex; gap:10px;">
                                    <button type="button" class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Kapat</button>
                                    <button type="submit" class="btn btn-primary">Durumu Güncelle</button>
                                </div>
                            </div>
                        </form>
                    </div>
                `;
                document.body.appendChild(div);
            }

            saveMeetingStatus(form, id) {
                const fd = new FormData(form);
                const status = fd.get('status');
                const comment = fd.get('comment');
                
                const m = Store.state.meetings.find(m => m.id === id);
                if (m) {
                    m.status = status;
                    m.comment = comment;
                    
                    // Otomatik not ekleme: Eğer durum "Yapıldı" ise notlara ekle
                    if (status === 'Yapıldı' && comment) {
                        Store.addNote(m.companyId, `[OTOMATİK GÖRÜŞME NOTU] - ${comment}`);
                    }
                    
                    Store.save();
                }
                
                form.closest('.modal-overlay').remove();
                this.render();
            }

            showDayMeetings(dayIndex, dayName) {
                const daysMap = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
                const dayFull = daysMap[dayIndex];
                const userId = Store.state.currentUser.id;
                
                const meetings = Store.state.meetings.filter(m => {
                   const d = new Date(m.date).getDay();
                   const adjustedDay = d === 0 ? 6 : d - 1; // Mon=0, Sun=6
                   return Number(m.repId) === userId && adjustedDay === dayIndex;
                });

                const div = document.createElement('div');
                div.className = 'modal-overlay';
                div.innerHTML = `
                    <div class="modal-content glass" style="width:500px;">
                        <div class="modal-header"><h3>${dayName} - Görüşme Detayları</h3><button class="btn btn-ghost btn-sm" onclick="this.closest('.modal-overlay').remove()">&times;</button></div>
                        <div style="padding:15px;">
                            ${meetings.length ? meetings.map(m => {
                                const company = [...Store.state.leads, ...Store.state.customers].find(c => c.id === Number(m.companyId));
                                const isDone = m.status === 'Yapıldı';
                                return `
                                    <div class="list-modal-item">
                                        <div>
                                            <div style="font-weight:700;">${company?.company}</div>
                                            <div style="font-size:0.75rem; opacity:0.6;">${m.time} - ${m.method}</div>
                                        </div>
                                        <div>
                                            ${isDone ? '<span class="badge" style="background:#2ecc71; font-size:0.7rem;">COMPLETED</span>' : '<span class="badge" style="background:#e74c3c; font-size:0.7rem;">NOT COMPLETED</span>'}
                                        </div>
                                    </div>
                                `;
                            }).join('') : '<p style="text-align:center; opacity:0.5;">Bu güne ait kayıt bulunamadı.</p>'}
                        </div>
                    </div>
                `;
                document.body.appendChild(div);
            }

            renderLogin() {
                return `
                <div class="login-page" style="height:100vh; display:flex; align-items:center; justify-content:center; background: #ffffff; color: #1a1a1a;">
                    <div class="login-card" style="width:400px; padding:40px; border-radius:24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); animation: slideUp 0.6s ease-out; border: 1px solid rgba(0,0,0,0.05);">
                        <div style="text-align:center; margin-bottom:30px;">
                            <img src="oypa_logo_v3.png" style="width:220px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.05));">
                            <h2 style="margin-top:20px; letter-spacing:1px; font-weight:800; color:#1a1a1a;">OYPA CRM</h2>
                            <p style="opacity:0.6; font-size:0.9rem; color:#666;">Multi-User Corporate Access</p>
                        </div>
                        <form onsubmit="event.preventDefault(); window.app.handleLogin(this);" class="crm-form">
                            <div class="form-group">
                                <label style="color:#1a1a1a; font-weight:600;">Kullanıcı Adı</label>
                                <input name="username" placeholder="Örn: helin" required style="background:#f9f9f9; border:1px solid #ddd; color:#1a1a1a;">
                            </div>
                            <div class="form-group">
                                <label style="color:#1a1a1a; font-weight:600;">Şifre</label>
                                <input type="password" name="password" placeholder="••••••••" required style="background:#f9f9f9; border:1px solid #ddd; color:#1a1a1a;">
                            </div>
                            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:10px; padding:14px; font-weight:700; background:linear-gradient(45deg, var(--primary-red), #ff4d4d); border:none; box-shadow: 0 4px 15px rgba(227, 6, 19, 0.3);">Giriş Yap</button>
                            <div id="login-error" style="color:var(--primary-red); font-size:0.8rem; text-align:center; margin-top:15px; display:none; font-weight:600;">Hatalı kullanıcı adı veya şifre!</div>
                        </form>
                    </div>
                </div>`;
            }

            handleLogin(form) {
                const fd = new FormData(form);
                const success = Store.login(fd.get('username'), fd.get('password'));
                if (success) {
                    this.render();
                } else {
                    document.getElementById('login-error').style.display = 'block';
                    form.password.value = '';
                }
            }

            showTargetEditModal() {
                const userId = Store.state.currentUser.id;
                const target = Store.state.targets[userId] || 30;
                const div = document.createElement('div');
                div.className = 'modal-overlay';
                div.innerHTML = `
                    <div class="modal-content glass" style="width:350px;">
                        <div class="modal-header"><h3>Haftalık Hedefi Güncelle</h3><button class="btn btn-ghost btn-sm" onclick="this.closest('.modal-overlay').remove()">&times;</button></div>
                        <form onsubmit="event.preventDefault(); Store.updateWeeklyTarget(this.target.value); this.closest('.modal-overlay').remove(); window.app.render();" class="crm-form">
                            <div class="form-group">
                                <label>Yeni Haftalık Toplantı Hedefi</label>
                                <input type="number" name="target" value="${target}" required min="1">
                            </div>
                            <div class="modal-footer" style="display:flex; justify-content:flex-end; gap:10px;">
                                <button type="button" class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">İptal</button>
                                <button type="submit" class="btn btn-primary">Hedefi Kaydet</button>
                            </div>
                        </form>
                    </div>
                `;
                document.body.appendChild(div);
            }

            showTargetDetails(type) {
                const userId = Store.state.currentUser.id;
                const title = type === 'new' ? 'New Customers (This Week)' : 'Existing Customers';
                const list = Store.state.customers.filter(c => {
                    if (Number(c.ownerId) !== userId) return false;
                    const active = new Date(c.activeDate);
                    const now = new Date();
                    const diff = (now - active) / (1000*60*60*24);
                    return type === 'new' ? diff <= 7 : diff > 7;
                });

                const div = document.createElement('div');
                div.className = 'modal-overlay';
                div.innerHTML = `
                    <div class="modal-content glass" style="width:500px;">
                        <div class="modal-header"><h3>${title}</h3><button class="btn btn-ghost btn-sm" onclick="this.closest('.modal-overlay').remove()">&times;</button></div>
                        <div style="padding:15px;">
                            ${list.length ? list.map(c => `
                                <div class="list-modal-item">
                                    <div>
                                        <div style="font-weight:700;">${c.company}</div>
                                        <div style="font-size:0.75rem; opacity:0.6;">${c.serviceSector}</div>
                                    </div>
                                    <button class="btn btn-ghost btn-sm" onclick="window.app.setView('detail', ${c.id}); document.querySelector('.modal-overlay').remove();">Dosyayı Aç</button>
                                </div>
                            `).join('') : '<p style="text-align:center; opacity:0.5;">Liste boş.</p>'}
                        </div>
                    </div>
                `;
                document.body.appendChild(div);
            }

            openExportModal(type) {
                const container = document.getElementById('export-modal-container') || document.body;
                const modalId = `m-export`;
                
                const div = document.createElement('div');
                div.id = modalId;
                div.className = 'modal-overlay';
                div.innerHTML = `
                    <div class="modal-content glass" style="width:400px;">
                        <div class="modal-header"><h3>Excel Raporu Al</h3><button class="btn btn-ghost btn-sm" onclick="this.closest('.modal-overlay').remove()">&times;</button></div>
                        <form onsubmit="event.preventDefault(); window.app.generateReport(this, '${type}');" class="crm-form">
                            <div class="form-group">
                                <label>Başlangıç Tarihi</label>
                                <input type="text" name="start" required readonly placeholder="Seçiniz..." 
                                    onclick="window.app.openDatePicker('start')"
                                    value="${new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0]}">
                            </div>
                            <div class="form-group">
                                <label>Bitiş Tarihi</label>
                                <input type="text" name="end" required readonly placeholder="Seçiniz..." 
                                    onclick="window.app.openDatePicker('end')"
                                    value="${new Date().toISOString().split('T')[0]}">
                            </div>
                            <div class="modal-footer" style="display:flex; justify-content:flex-end; gap:10px;">
                                <button type="button" class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">İptal</button>
                                <button type="submit" class="btn btn-primary">Raporu Excel'e Aktar</button>
                            </div>
                        </form>
                    </div>
                `;
                document.body.appendChild(div);
            }

            generateReport(form, type) {
                const fd = new FormData(form);
                const start = fd.get('start');
                const end = fd.get('end');
                
                let entities = [];
                if (type === 'leads') {
                    entities = [...Store.state.leads];
                } else if (type === 'portfolio') {
                    // Portfolyo için hem mevcut müşteriler hem de atanmış yetkiliye göre filtrele
                    entities = Store.state.customers.filter(c => Number(c.ownerId) === Store.state.currentUser.id);
                } else {
                    entities = [...Store.state.customers];
                }
                
                // Sıralama: Sisteme son eklenenden (en yeni) ilk eklenene (en eski) doğru
                entities.sort((a, b) => b.id - a.id);
                
                const reportData = entities.map(company => {
                    // Firma bazlı rapor: Her firma için en son gerçekleştirilen görüşmeyi bul
                    const companyMeetings = Store.state.meetings
                        .filter(m => Number(m.companyId) === company.id)
                        .sort((a, b) => new Date(b.date) - new Date(a.date));
                    
                    const lastMeeting = companyMeetings[0];
                    const rep = lastMeeting ? Store.state.reps.find(r => r.id === Number(lastMeeting.repId)) : null;
                    
                    return {
                        'Firma Ünvanı': company.company,
                        'Referans / Kaynak': `${company.dataSource || '-'}${company.dataSourceDetail ? ` (${company.dataSourceDetail})` : ''}`,
                        'Firma Tipi': company.isInternal ? 'İç Firma (OYAK)' : 'Dış Firma',
                        'Firmanın Kendi Sektörü': company.companySector || '-',
                        'Hizmet Sektörümüz': `${company.serviceSector || '-'}${company.serviceSector === 'Diğer' ? ` (${company.serviceSectorDetail || '-'})` : ''}`,
                        'Son Görüşme Tarihi': lastMeeting ? lastMeeting.date : 'Görüşme yok',
                        'Son Görüşme Temsilcisi': rep?.name || '-',
                        'Müşteri Durumu': company.isNewCustomer ? 'New Customer' : 'Existing Customer'
                    };
                });

                if (reportData.length === 0) {
                    alert('Sistemde raporlanacak firma bulunamadı.');
                    return;
                }
                
                Store.exportToCSV(reportData, `${type}_raporu_${start}_${end}.csv`);
                document.getElementById('m-export').remove();
            }

            openDatePicker(inputName) {
                const now = new Date();
                this.renderDatePicker(now.getFullYear(), now.getMonth(), inputName);
            }

            renderDatePicker(year, month, inputName) {
                let overlay = document.getElementById('dp-overlay');
                if (!overlay) {
                    overlay = document.createElement('div');
                    overlay.id = 'dp-overlay';
                    overlay.className = 'datepicker-overlay';
                    overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };
                    document.body.appendChild(overlay);
                }

                const monthNames = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const firstDay = new Date(year, month, 1).getDay(); // 0 is Sunday
                const startDay = firstDay === 0 ? 6 : firstDay - 1; // Align PT=0

                overlay.innerHTML = `
                    <div class="datepicker-content">
                        <div class="datepicker-header">
                            <div class="datepicker-title">${monthNames[month]} ${year}</div>
                            <div class="datepicker-nav">
                                <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation(); window.app.renderDatePicker(${month === 0 ? year - 1 : year}, ${month === 0 ? 11 : month - 1}, '${inputName}')">&lt;</button>
                                <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation(); window.app.renderDatePicker(${month === 11 ? year + 1 : year}, ${month === 11 ? 0 : month + 1}, '${inputName}')">&gt;</button>
                            </div>
                        </div>
                        <div class="datepicker-grid">
                            <div class="datepicker-weekday">PT</div>
                            <div class="datepicker-weekday">SA</div>
                            <div class="datepicker-weekday">ÇA</div>
                            <div class="datepicker-weekday">PE</div>
                            <div class="datepicker-weekday">CU</div>
                            <div class="datepicker-weekday">CT</div>
                            <div class="datepicker-weekday">PA</div>
                            ${Array(startDay).fill('<div class="datepicker-day empty"></div>').join('')}
                            ${Array.from({length: daysInMonth}, (_, i) => i + 1).map(d => {
                                const isToday = new Date().toDateString() === new Date(year, month, d).toDateString();
                                return `<div class="datepicker-day ${isToday ? 'today' : ''}" onclick="event.stopPropagation(); window.app.selectDatePickerDate(${d}, ${month}, ${year}, '${inputName}')">${d}</div>`;
                            }).join('')}
                        </div>
                    </div>
                `;
            }

            selectDatePickerDate(d, m, y, inputName) {
                const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const input = document.querySelector(`input[name="${inputName}"]`);
                if (input) {
                    input.value = dateStr;
                }
                document.getElementById('dp-overlay').remove();
            }
        }

        window.app = new App();
    </script>
</body>
</html>
