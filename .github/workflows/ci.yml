name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  # E2E job'u maliyetli olduğundan (SQL Server konteyneri + tarayıcı) yalnızca
  # elle tetiklenir; backend/frontend job'ları her push/PR'da çalışmaya devam eder.
  workflow_dispatch:

jobs:
  backend:
    name: Backend (.NET 9)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore backend/OypaCrm.sln

      - name: Build
        run: dotnet build backend/OypaCrm.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/OypaCrm.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: "**/TestResults/*.trx"
          if-no-files-found: ignore

  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright)
    # Maliyetli (SQL Server konteyneri + tarayıcı indirme) — yalnızca elle tetiklenir.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Oypa_CI_Pass123"
        ports:
          - 1433:1433
    env:
      ASPNETCORE_ENVIRONMENT: Development
      # CI'da LocalDB yok → service konteynerindeki SQL Server'a bağlan.
      # Env değişkeni appsettings.json'daki ConnectionStrings:DefaultConnection'ı ezer.
      ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=OypaCrm;User Id=sa;Password=Oypa_CI_Pass123;TrustServerCertificate=True;MultipleActiveResultSets=true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: SQL Server hazır olana kadar bekle
        run: |
          for i in $(seq 1 60); do
            if (echo > /dev/tcp/127.0.0.1/1433) 2>/dev/null; then
              echo "SQL Server portu açık"; sleep 5; exit 0
            fi
            echo "SQL Server bekleniyor ($i/60)"; sleep 2
          done
          echo "SQL Server zamanında açılmadı"; exit 1

      - name: Frontend bağımlılıkları
        working-directory: frontend
        run: npm ci

      - name: Playwright tarayıcısı (chromium)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Backend restore + build (E2E webServer hızlı başlasın)
        run: |
          dotnet restore backend/OypaCrm.sln
          dotnet build backend/OypaCrm.sln --configuration Debug --no-restore

      - name: E2E testleri (Playwright webServer API+frontend'i başlatır)
        working-directory: frontend
        run: npm run test:e2e

      - name: Playwright izleri (hata ayıklama) yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/
          if-no-files-found: ignore
