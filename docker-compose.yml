services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: oypa-crm-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -No -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - oypa-net

  api:
    build:
      context: .
      dockerfile: backend/src/Api/Dockerfile
    container_name: oypa-crm-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=db;Database=OypaCrm;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True"
      Jwt__Secret: ${JWT_SECRET}
    ports:
      - "5080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - oypa-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5080/api
    container_name: oypa-crm-frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - oypa-net

volumes:
  mssql-data:

networks:
  oypa-net:
    driver: bridge
